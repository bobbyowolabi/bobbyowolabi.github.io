<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <defs>
    <!-- Blueprint background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d2244;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#071020;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle noise texture overlay -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="overlay" result="blend"/>
      <feComposite in="blend" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Glow for accent lines -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Strong glow for key elements -->
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="bounds">
      <rect width="1200" height="500"/>
    </clipPath>
  </defs>

  <g clip-path="url(#bounds)">

    <!-- ── Background ── -->
    <rect width="1200" height="500" fill="url(#bgGrad)"/>

    <!-- ── Fine grid (small squares) ── -->
    <g stroke="#1a3a6e" stroke-width="0.4" opacity="0.6">
      <!-- Vertical lines every 20px -->
      <line x1="20" y1="0" x2="20" y2="500"/>
      <line x1="40" y1="0" x2="40" y2="500"/>
      <line x1="60" y1="0" x2="60" y2="500"/>
      <line x1="80" y1="0" x2="80" y2="500"/>
      <line x1="100" y1="0" x2="100" y2="500"/>
      <line x1="120" y1="0" x2="120" y2="500"/>
      <line x1="140" y1="0" x2="140" y2="500"/>
      <line x1="160" y1="0" x2="160" y2="500"/>
      <line x1="180" y1="0" x2="180" y2="500"/>
      <line x1="200" y1="0" x2="200" y2="500"/>
      <line x1="220" y1="0" x2="220" y2="500"/>
      <line x1="240" y1="0" x2="240" y2="500"/>
      <line x1="260" y1="0" x2="260" y2="500"/>
      <line x1="280" y1="0" x2="280" y2="500"/>
      <line x1="300" y1="0" x2="300" y2="500"/>
      <line x1="320" y1="0" x2="320" y2="500"/>
      <line x1="340" y1="0" x2="340" y2="500"/>
      <line x1="360" y1="0" x2="360" y2="500"/>
      <line x1="380" y1="0" x2="380" y2="500"/>
      <line x1="400" y1="0" x2="400" y2="500"/>
      <line x1="420" y1="0" x2="420" y2="500"/>
      <line x1="440" y1="0" x2="440" y2="500"/>
      <line x1="460" y1="0" x2="460" y2="500"/>
      <line x1="480" y1="0" x2="480" y2="500"/>
      <line x1="500" y1="0" x2="500" y2="500"/>
      <line x1="520" y1="0" x2="520" y2="500"/>
      <line x1="540" y1="0" x2="540" y2="500"/>
      <line x1="560" y1="0" x2="560" y2="500"/>
      <line x1="580" y1="0" x2="580" y2="500"/>
      <line x1="600" y1="0" x2="600" y2="500"/>
      <line x1="620" y1="0" x2="620" y2="500"/>
      <line x1="640" y1="0" x2="640" y2="500"/>
      <line x1="660" y1="0" x2="660" y2="500"/>
      <line x1="680" y1="0" x2="680" y2="500"/>
      <line x1="700" y1="0" x2="700" y2="500"/>
      <line x1="720" y1="0" x2="720" y2="500"/>
      <line x1="740" y1="0" x2="740" y2="500"/>
      <line x1="760" y1="0" x2="760" y2="500"/>
      <line x1="780" y1="0" x2="780" y2="500"/>
      <line x1="800" y1="0" x2="800" y2="500"/>
      <line x1="820" y1="0" x2="820" y2="500"/>
      <line x1="840" y1="0" x2="840" y2="500"/>
      <line x1="860" y1="0" x2="860" y2="500"/>
      <line x1="880" y1="0" x2="880" y2="500"/>
      <line x1="900" y1="0" x2="900" y2="500"/>
      <line x1="920" y1="0" x2="920" y2="500"/>
      <line x1="940" y1="0" x2="940" y2="500"/>
      <line x1="960" y1="0" x2="960" y2="500"/>
      <line x1="980" y1="0" x2="980" y2="500"/>
      <line x1="1000" y1="0" x2="1000" y2="500"/>
      <line x1="1020" y1="0" x2="1020" y2="500"/>
      <line x1="1040" y1="0" x2="1040" y2="500"/>
      <line x1="1060" y1="0" x2="1060" y2="500"/>
      <line x1="1080" y1="0" x2="1080" y2="500"/>
      <line x1="1100" y1="0" x2="1100" y2="500"/>
      <line x1="1120" y1="0" x2="1120" y2="500"/>
      <line x1="1140" y1="0" x2="1140" y2="500"/>
      <line x1="1160" y1="0" x2="1160" y2="500"/>
      <line x1="1180" y1="0" x2="1180" y2="500"/>
      <!-- Horizontal lines every 20px -->
      <line x1="0" y1="20" x2="1200" y2="20"/>
      <line x1="0" y1="40" x2="1200" y2="40"/>
      <line x1="0" y1="60" x2="1200" y2="60"/>
      <line x1="0" y1="80" x2="1200" y2="80"/>
      <line x1="0" y1="100" x2="1200" y2="100"/>
      <line x1="0" y1="120" x2="1200" y2="120"/>
      <line x1="0" y1="140" x2="1200" y2="140"/>
      <line x1="0" y1="160" x2="1200" y2="160"/>
      <line x1="0" y1="180" x2="1200" y2="180"/>
      <line x1="0" y1="200" x2="1200" y2="200"/>
      <line x1="0" y1="220" x2="1200" y2="220"/>
      <line x1="0" y1="240" x2="1200" y2="240"/>
      <line x1="0" y1="260" x2="1200" y2="260"/>
      <line x1="0" y1="280" x2="1200" y2="280"/>
      <line x1="0" y1="300" x2="1200" y2="300"/>
      <line x1="0" y1="320" x2="1200" y2="320"/>
      <line x1="0" y1="340" x2="1200" y2="340"/>
      <line x1="0" y1="360" x2="1200" y2="360"/>
      <line x1="0" y1="380" x2="1200" y2="380"/>
      <line x1="0" y1="400" x2="1200" y2="400"/>
      <line x1="0" y1="420" x2="1200" y2="420"/>
      <line x1="0" y1="440" x2="1200" y2="440"/>
      <line x1="0" y1="460" x2="1200" y2="460"/>
      <line x1="0" y1="480" x2="1200" y2="480"/>
    </g>

    <!-- ── Major grid lines every 100px ── -->
    <g stroke="#1e4a8a" stroke-width="0.8" opacity="0.7">
      <line x1="100" y1="0" x2="100" y2="500"/>
      <line x1="200" y1="0" x2="200" y2="500"/>
      <line x1="300" y1="0" x2="300" y2="500"/>
      <line x1="400" y1="0" x2="400" y2="500"/>
      <line x1="500" y1="0" x2="500" y2="500"/>
      <line x1="600" y1="0" x2="600" y2="500"/>
      <line x1="700" y1="0" x2="700" y2="500"/>
      <line x1="800" y1="0" x2="800" y2="500"/>
      <line x1="900" y1="0" x2="900" y2="500"/>
      <line x1="1000" y1="0" x2="1000" y2="500"/>
      <line x1="1100" y1="0" x2="1100" y2="500"/>
      <line x1="0" y1="100" x2="1200" y2="100"/>
      <line x1="0" y1="200" x2="1200" y2="200"/>
      <line x1="0" y1="300" x2="1200" y2="300"/>
      <line x1="0" y1="400" x2="1200" y2="400"/>
    </g>

    <!-- ── Test anatomy schematic — right side ── -->
    <!-- Box 1: Inputs / State -->
    <g filter="url(#glow)">
      <rect x="720" y="60" width="200" height="80" rx="3" fill="none" stroke="#4ab8e8" stroke-width="1.5"/>
      <rect x="720" y="60" width="200" height="22" rx="3" fill="#4ab8e8" fill-opacity="0.15"/>
      <line x1="720" y1="82" x2="920" y2="82" stroke="#4ab8e8" stroke-width="0.8"/>
      <text x="820" y="76" text-anchor="middle" fill="#4ab8e8" font-size="9" font-family="monospace" letter-spacing="1">INPUTS / STATE</text>
      <text x="734" y="98" fill="#7dd4f5" font-size="8" font-family="monospace">▸ test data</text>
      <text x="734" y="112" fill="#7dd4f5" font-size="8" font-family="monospace">▸ environment setup</text>
      <text x="734" y="126" fill="#7dd4f5" font-size="8" font-family="monospace">▸ mocked dependencies</text>
    </g>

    <!-- Arrow down -->
    <g filter="url(#glow)">
      <line x1="820" y1="140" x2="820" y2="168" stroke="#4ab8e8" stroke-width="1.5" stroke-dasharray="4,3"/>
      <polygon points="813,165 820,175 827,165" fill="#4ab8e8"/>
    </g>

    <!-- Box 2: Execution -->
    <g filter="url(#glow)">
      <rect x="720" y="175" width="200" height="80" rx="3" fill="none" stroke="#4ab8e8" stroke-width="1.5"/>
      <rect x="720" y="175" width="200" height="22" rx="3" fill="#4ab8e8" fill-opacity="0.15"/>
      <line x1="720" y1="197" x2="920" y2="197" stroke="#4ab8e8" stroke-width="0.8"/>
      <text x="820" y="191" text-anchor="middle" fill="#4ab8e8" font-size="9" font-family="monospace" letter-spacing="1">EXECUTION</text>
      <text x="734" y="213" fill="#7dd4f5" font-size="8" font-family="monospace">▸ invoke system under test</text>
      <text x="734" y="227" fill="#a0e0ff" font-size="8" font-family="monospace">  result = service</text>
      <text x="734" y="241" fill="#a0e0ff" font-size="8" font-family="monospace">           .process();</text>
    </g>

    <!-- Arrow down -->
    <g filter="url(#glow)">
      <line x1="820" y1="255" x2="820" y2="283" stroke="#4ab8e8" stroke-width="1.5" stroke-dasharray="4,3"/>
      <polygon points="813,280 820,290 827,280" fill="#4ab8e8"/>
    </g>

    <!-- Box 3: Assertions -->
    <g filter="url(#glow)">
      <rect x="720" y="290" width="200" height="80" rx="3" fill="none" stroke="#4ab8e8" stroke-width="1.5"/>
      <rect x="720" y="290" width="200" height="22" rx="3" fill="#4ab8e8" fill-opacity="0.15"/>
      <line x1="720" y1="312" x2="920" y2="312" stroke="#4ab8e8" stroke-width="0.8"/>
      <text x="820" y="306" text-anchor="middle" fill="#4ab8e8" font-size="9" font-family="monospace" letter-spacing="1">ASSERTIONS</text>
      <text x="734" y="328" fill="#7dd4f5" font-size="8" font-family="monospace">▸ verify output</text>
      <text x="734" y="342" fill="#7dd4f5" font-size="8" font-family="monospace">▸ verify side effects</text>
      <text x="734" y="356" fill="#7dd4f5" font-size="8" font-family="monospace">▸ verify state change</text>
    </g>

    <!-- Bracket connecting all three boxes -->
    <g filter="url(#glow)" stroke="#2a6aaa" stroke-width="1" fill="none">
      <line x1="950" y1="60" x2="960" y2="60"/>
      <line x1="960" y1="60" x2="960" y2="370"/>
      <line x1="960" y1="370" x2="950" y2="370"/>
      <line x1="960" y1="215" x2="975" y2="215"/>
    </g>
    <text x="980" y="212" fill="#2a7aaa" font-size="8" font-family="monospace">anatomy</text>
    <text x="980" y="222" fill="#2a7aaa" font-size="8" font-family="monospace">of a test</text>

    <!-- ── Dimension lines ── -->
    <!-- Horizontal dimension line top -->
    <g stroke="#2a6aaa" stroke-width="0.8" fill="none" opacity="0.7">
      <line x1="40" y1="30" x2="680" y2="30"/>
      <line x1="40" y1="25" x2="40" y2="35"/>
      <line x1="680" y1="25" x2="680" y2="35"/>
    </g>
    <text x="360" y="27" text-anchor="middle" fill="#2a7aaa" font-size="7" font-family="monospace" opacity="0.8">1200px</text>

    <!-- Vertical dimension line left -->
    <g stroke="#2a6aaa" stroke-width="0.8" fill="none" opacity="0.7">
      <line x1="18" y1="40" x2="18" y2="460"/>
      <line x1="13" y1="40" x2="23" y2="40"/>
      <line x1="13" y1="460" x2="23" y2="460"/>
    </g>
    <text x="14" y="255" text-anchor="middle" fill="#2a7aaa" font-size="7" font-family="monospace" opacity="0.8" transform="rotate(-90, 14, 255)">500px</text>

    <!-- ── Annotation callouts (scattered) ── -->
    <!-- Top right corner mark -->
    <g stroke="#4ab8e8" stroke-width="0.8" opacity="0.5">
      <line x1="1150" y1="40" x2="1180" y2="40"/>
      <line x1="1180" y1="40" x2="1180" y2="70"/>
    </g>
    <!-- Bottom left corner mark -->
    <g stroke="#4ab8e8" stroke-width="0.8" opacity="0.5">
      <line x1="20" y1="460" x2="50" y2="460"/>
      <line x1="20" y1="430" x2="20" y2="460"/>
    </g>

    <!-- Cross-hair / registration marks -->
    <g stroke="#2a6aaa" stroke-width="0.7" opacity="0.6">
      <!-- Center cross -->
      <circle cx="1080" cy="420" r="12" fill="none"/>
      <line x1="1068" y1="420" x2="1092" y2="420"/>
      <line x1="1080" y1="408" x2="1080" y2="432"/>
      <!-- Small cross -->
      <circle cx="60" cy="440" r="8" fill="none"/>
      <line x1="52" y1="440" x2="68" y2="440"/>
      <line x1="60" y1="432" x2="60" y2="448"/>
    </g>

    <!-- ── Scattered annotation labels ── -->
    <text x="1050" y="455" fill="#2a6aaa" font-size="7" font-family="monospace" opacity="0.7">REG MARK</text>
    <text x="1100" y="480" fill="#1e4a8a" font-size="7" font-family="monospace" opacity="0.6">REV 1.0</text>
    <text x="40" y="465" fill="#2a6aaa" font-size="7" font-family="monospace" opacity="0.7">SCALE 1:1</text>

    <!-- Title block bottom right -->
    <g stroke="#2a6aaa" stroke-width="0.8" fill="none" opacity="0.6">
      <rect x="1020" y="440" width="160" height="50"/>
      <line x1="1020" y1="455" x2="1180" y2="455"/>
      <line x1="1100" y1="440" x2="1100" y2="490"/>
    </g>
    <text x="1060" y="451" text-anchor="middle" fill="#2a7aaa" font-size="7" font-family="monospace" opacity="0.8">DRAWN BY</text>
    <text x="1060" y="468" text-anchor="middle" fill="#4ab8e8" font-size="7" font-family="monospace" opacity="0.9">B. OWOLABI</text>
    <text x="1140" y="451" text-anchor="middle" fill="#2a7aaa" font-size="7" font-family="monospace" opacity="0.8">DATE</text>
    <text x="1140" y="468" text-anchor="middle" fill="#4ab8e8" font-size="7" font-family="monospace" opacity="0.9">2025</text>
    <text x="1100" y="482" text-anchor="middle" fill="#2a7aaa" font-size="7" font-family="monospace" opacity="0.7">TEST SPECIFICATION v1.0</text>

    <!-- ── Faint diagonal construction lines ── -->
    <g stroke="#1a3a6e" stroke-width="0.5" opacity="0.3">
      <line x1="0" y1="0" x2="600" y2="500"/>
      <line x1="100" y1="0" x2="700" y2="500"/>
    </g>

    <!-- ── Glowing accent horizontal line ── -->
    <line x1="40" y1="430" x2="660" y2="430" stroke="#4ab8e8" stroke-width="0.8" opacity="0.25" filter="url(#glow)"/>

    <!-- ── Left side — large spec label area ── -->
    <!-- Spec title -->
    <text x="60" y="130" fill="#ffffff" font-size="52" font-family="monospace" font-weight="bold" letter-spacing="-1" filter="url(#strongGlow)" opacity="0.95">SPEC</text>
    <text x="60" y="185" fill="#4ab8e8" font-size="20" font-family="monospace" letter-spacing="6" filter="url(#glow)">v1.0 — UNIT TEST</text>

    <!-- Subtitle annotation line -->
    <line x1="60" y1="198" x2="480" y2="198" stroke="#4ab8e8" stroke-width="0.8" opacity="0.5"/>

    <!-- Field labels -->
    <text x="60" y="230" fill="#2a7aaa" font-size="8" font-family="monospace" letter-spacing="2">CLASSIFICATION</text>
    <text x="60" y="246" fill="#7dd4f5" font-size="10" font-family="monospace">SOFTWARE TEST SPECIFICATION</text>

    <text x="60" y="278" fill="#2a7aaa" font-size="8" font-family="monospace" letter-spacing="2">PROPERTIES</text>
    <text x="60" y="294" fill="#7dd4f5" font-size="9" font-family="monospace">▸ READABLE</text>
    <text x="60" y="310" fill="#7dd4f5" font-size="9" font-family="monospace">▸ RELIABLE &amp; TRUSTWORTHY</text>
    <text x="60" y="326" fill="#7dd4f5" font-size="9" font-family="monospace">▸ ACTIONABLE</text>

    <text x="60" y="358" fill="#2a7aaa" font-size="8" font-family="monospace" letter-spacing="2">STATUS</text>
    <text x="60" y="374" fill="#a0e0ff" font-size="9" font-family="monospace" filter="url(#glow)">● DURABLE ARTIFACT</text>

    <!-- ── Vertical separator between left content and schematic ── -->
    <line x1="700" y1="40" x2="700" y2="460" stroke="#1e4a8a" stroke-width="1" stroke-dasharray="6,4" opacity="0.6"/>

  </g>
</svg>
