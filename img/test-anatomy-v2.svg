<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 520" width="320" height="520" font-family="Georgia, serif">

  <!-- Background -->
  <rect width="320" height="520" fill="#fafafa" rx="8"/>

  <!-- ─── Box 1: Inputs / State ─── -->
  <rect x="40" y="20" width="240" height="130" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <!-- Dark header -->
  <rect x="40" y="20" width="240" height="36" rx="6" fill="#333333"/>
  <rect x="40" y="44" width="240" height="12" fill="#333333"/>
  <text x="160" y="43" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Inputs / State</text>
  <!-- Body items -->
  <text x="62" y="78" fill="#555555" font-size="11">▸  Test data</text>
  <text x="62" y="98" fill="#555555" font-size="11">▸  Environment setup</text>
  <text x="62" y="118" fill="#555555" font-size="11">▸  Mocked dependencies</text>

  <!-- Arrow 1 -->
  <line x1="160" y1="150" x2="160" y2="188" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── Box 2: Execution ─── -->
  <rect x="40" y="190" width="240" height="150" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <!-- Dark header -->
  <rect x="40" y="190" width="240" height="36" rx="6" fill="#333333"/>
  <rect x="40" y="214" width="240" height="12" fill="#333333"/>
  <text x="160" y="213" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Execution</text>
  <!-- Body items -->
  <text x="62" y="248" fill="#555555" font-size="11">▸  Call the system under test</text>
  <!-- Code snippet -->
  <rect x="62" y="260" width="196" height="64" rx="4" fill="#f4f4f4" stroke="#dddddd" stroke-width="1"/>
  <text x="76" y="278" fill="#888888" font-size="10" font-family="monospace">// invoke the SUT</text>
  <text x="76" y="296" fill="#333333" font-size="10" font-family="monospace">result = service</text>
  <text x="76" y="312" fill="#333333" font-size="10" font-family="monospace">           .process();</text>

  <!-- Arrow 2 -->
  <line x1="160" y1="340" x2="160" y2="378" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── Box 3: Assertions ─── -->
  <rect x="40" y="380" width="240" height="120" rx="6" fill="#ffffff" stroke="#333333" stroke-width="1.5"/>
  <!-- Dark header -->
  <rect x="40" y="380" width="240" height="36" rx="6" fill="#333333"/>
  <rect x="40" y="404" width="240" height="12" fill="#333333"/>
  <text x="160" y="403" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="bold">Assertions</text>
  <!-- Body items -->
  <text x="62" y="438" fill="#555555" font-size="11">▸  Verify output</text>
  <text x="62" y="458" fill="#555555" font-size="11">▸  Verify side effects</text>
  <text x="62" y="478" fill="#555555" font-size="11">▸  Verify state change</text>

  <!-- Caption -->
  <text x="160" y="512" text-anchor="middle" fill="#aaaaaa" font-size="10" font-style="italic">The three parts of a test</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333333"/>
    </marker>
  </defs>

</svg>
